name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run test suite
        run: bun test tests/
      - name: Validate all SKILL.md frontmatter
        run: |
          for s in harness-analyze harness-propose harness-render-agents-md harness-review harness-eval .; do
            npx -y skills-ref validate "$s"
          done
